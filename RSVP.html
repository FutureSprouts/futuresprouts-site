<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Events | FutureSprouts</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="FutureSprouts events: upcoming events, RSVP for updates, and community impact." />

  <meta property="og:title" content="Events | FutureSprouts" />
  <meta property="og:description" content="Upcoming events, RSVP, and community highlights." />
  <meta property="og:type" content="website" />

  <link rel="stylesheet" href="style.css" />
  <script src="config.js"></script>
</head>
<body>

  <div id="siteHeader"></div>

  <div class="container mobile-menu">
    <a href="about.html">About</a>
    <a href="programs.html">Programs</a>
    <a href="services.html">Services</a>
    <a href="events.html">Events</a>
    <a href="impact.html">Impact</a>
    <a href="get-involved.html">Get Involved</a>
    <a href="contact.html">Contact</a>
    <a href="donate.html" class="donate-btn">Donate</a>

    <a href="cart.html" class="cart-link mobile-cart-link" aria-label="View cart">
      <span class="cart-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="18" height="18" role="img" focusable="false">
          <path d="M6.5 6.5h14l-1.2 7.2a2 2 0 0 1-2 1.7H9.1a2 2 0 0 1-2-1.6L5.2 3.8H2.8"
            fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="9.5" cy="20" r="1.4" fill="currentColor"/>
          <circle cx="17.5" cy="20" r="1.4" fill="currentColor"/>
        </svg>
      </span>
      <span style="font-weight:800;">Cart</span>
      <span class="cart-badge" id="cartBadgeMobile">0</span>
    </a>
  </div>

  <section class="section">
    <div class="container">
      <div class="kicker reveal">Events</div>
      <h2 class="reveal">Upcoming events</h2>
      <p class="reveal">
        Take a look at some of the events we're planning, RSVP for updates!
      </p>



      <div id="rsvp-section" style="margin-top: 40px;">
        <div class="card reveal">
          <div class="pill">RSVP & Updates</div>
          <h3>Join an Upcoming Event</h3>
          <p class="small">Sign up to receive details and updates about our upcoming events.</p>

          <form class="form" action="https://formspree.io/f/mdakervk" method="POST">
            <input type="hidden" name="_subject" value="New Event RSVP - FutureSprouts">

            <div class="form-row">
              <input class="input" type="text" name="name" placeholder="Full name" required>
              <input class="input" type="email" name="email" placeholder="Email" required>
            </div>

            <div class="form-row">
              <select class="input" name="event-interest" required style="cursor: pointer;">
                <option value="" disabled selected>Which event(s) are you interested in?</option>
                <option value="Community Cleanup">Community Cleanup</option>
                <option value="Seed Swap">Seed Swap & Workshop</option>
                <option value="Both Events">Both Upcoming Events</option>
                <option value="General Interest">Just notify me of future events</option>
              </select>
              
            </div>

            <textarea name="message" placeholder="Any specific questions or accessibility needs we should know about?"></textarea>
            
            <button class="btn primary" type="submit" style="width: 100%;">Submit RSVP</button>
          </form>
        </div>
      </div>

    </div>
  </section>

  <div id="siteFooter"></div>

  <script src="script.js"></script>
</body>
</html>
