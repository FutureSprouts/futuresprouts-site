<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Events | FutureSprouts</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="FutureSprouts events: upcoming events, RSVP for updates, and community impact." />
  <meta property="og:title" content="Events | FutureSprouts" />
  <meta property="og:description" content="Upcoming events, RSVP, and community highlights." />
  <meta property="og:type" content="website" />
  <link rel="stylesheet" href="style.css" />
  <script src="config.js"></script>
</head>
<body>
  <div id="siteHeader"></div>

  <section class="section section-tight">
    <div class="container">
      <div class="kicker reveal">Events</div>
      <h2 class="reveal">Upcoming events</h2>
      <p class="reveal">
        Take a look at some of the events we're planning, RSVP for updates!
      </p>
    </div>
  </section>

  <section class="section alt">
    <div class="container">
      <div class="grid cols-2">

        <!-- EVENT RSVP (full width) -->
        <div class="card reveal" style="grid-column: 1 / -1;">
          <div class="pill">RSVP & Updates</div>
          <h3>Join an Upcoming Event</h3>
          <p class="small">Sign up to receive details and updates about our upcoming events.</p>

          <form class="form" action="https://formspree.io/f/mdakervk" method="POST">
            <input type="hidden" name="_subject" value="New Event RSVP - FutureSprouts">
            <div class="form-row">
              <input class="input" type="text" name="name" placeholder="Full name" required>
              <input class="input" type="email" name="email" placeholder="Email" required>
            </div>
            <div class="form-row">
              <select class="input" name="event-interest" required style="cursor: pointer;">
                <option value="" disabled selected>Which event(s) are you interested in?</option>
                <option value="Community Cleanup">Community Cleanup</option>
                <option value="Seed Swap">Seed Swap & Workshop</option>
                <option value="Both Events">Both Upcoming Events</option>
                <option value="General Interest">Just notify me of future events</option>
              </select>
            </div>
            <textarea name="message" placeholder="Any specific questions or accessibility needs we should know about?"></textarea>
            <button class="btn primary" type="submit">Submit RSVP</button>
          </form>
        </div>

      </div>
    </div>
  </section>

  <div id="siteFooter"></div>
  <script src="script.js"></script>
</body>
</html>
